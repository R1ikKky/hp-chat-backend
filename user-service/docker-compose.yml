version: '3.9'

services:
  postgres:
    container_name: postgres
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: 'rick'
      POSTGRES_PASSWORD: 'rick'
      POSTGRES_DB: 'user-service'
    ports:
      - '5432:5432'
    volumes:
    - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server --console-address ":9001" /data
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_storage:/data
    environment:
       MINIO_ROOT_USER: minioadmin
       MINIO_ROOT_PASSWORD: minioadmin 

volumes:
  pgdata:
  minio_storage:

