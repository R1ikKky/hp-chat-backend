services:
  postgres:
  container-name: postgres
  image: postgres:latest
  restart: always
  environment:
    POSTGRES_USERNAME: ${POSTGRES_USERNAME}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    POSTGRES_DB: ${POSTGRES_DB}
  ports:
    - '5432:5432'
  volumes:
  - pgdata:/var/lib/postgresql/data
  networks:
  - backend
volumes:
  pgdata:
networks:
  backend: